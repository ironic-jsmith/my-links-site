<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@600;700&display=swap');
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E0F11;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:rgba(124,138,110,0.25);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(124,138,110,0);stop-opacity:1" />
    </radialGradient>
    <filter id="gloss">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Background with olive accent -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#accentGlow)"/>
  
  <!-- 2000s fruitego aesthetic: subtle gloss and depth -->
  <g opacity="0.08">
    <circle cx="150" cy="100" r="120" fill="#7C8A6E"/>
    <circle cx="1050" cy="550" r="140" fill="#7C8A6E"/>
  </g>
  
  <!-- Subtle rounded rectangle frame (fruitego style) -->
  <rect x="80" y="80" width="1040" height="470" rx="32" ry="32" fill="none" stroke="rgba(124,138,110,0.2)" stroke-width="2"/>
  
  <!-- Top accent bar -->
  <rect x="80" y="80" width="1040" height="6" rx="3" fill="#7C8A6E" opacity="0.4"/>
  
  <!-- Avatar circle -->
  <circle cx="600" cy="160" r="50" fill="none" stroke="rgba(124,138,110,0.5)" stroke-width="2"/>
  <circle cx="600" cy="160" r="42" fill="rgba(124,138,110,0.08)"/>
  <text x="600" y="175" font-family="Schibsted Grotesk, sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="#7C8A6E">S</text>
  
  <!-- Main headline -->
  <text x="600" y="280" font-family="Schibsted Grotesk, sans-serif" font-size="64" font-weight="700" text-anchor="middle" fill="#E7E5DF" letter-spacing="-1">stxbandz</text>
  
  <!-- Tagline -->
  <text x="600" y="330" font-family="Schibsted Grotesk, sans-serif" font-size="28" font-weight="600" text-anchor="middle" fill="#86888E">builder • writer • investor</text>
  
  <!-- Bottom descriptor with terminal aesthetic -->
  <rect x="200" y="380" width="800" height="100" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(124,138,110,0.15)" stroke-width="1"/>
  
  <text x="220" y="410" font-family="'Courier New', monospace" font-size="16" fill="#7C8A6E" letter-spacing="2">PROFILE • INDEX • LINKS</text>
  <text x="220" y="445" font-family="'Courier New', monospace" font-size="14" fill="#86888E" letter-spacing="0.5">A quiet collection of the things I make,</text>
  <text x="220" y="470" font-family="'Courier New', monospace" font-size="14" fill="#86888E" letter-spacing="0.5">trade, and recommend.</text>
  
  <!-- 2000s gloss effect (subtle shine) -->
  <ellipse cx="600" cy="200" rx="380" ry="120" fill="rgba(255,255,255,0.03)" opacity="0.6" filter="url(#gloss)"/>
  
  <!-- Bottom accent elements (fruitego style) -->
  <line x1="150" y1="560" x2="250" y2="560" stroke="#7C8A6E" stroke-width="2" opacity="0.3"/>
  <line x1="950" y1="560" x2="1050" y2="560" stroke="#7C8A6E" stroke-width="2" opacity="0.3"/>
</svg>
