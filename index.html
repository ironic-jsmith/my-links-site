<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B1420;
    --surface: #121E2C;
    --surface-hover: #182838;
    --border: #22334A;
    --text: #EDEFF2;
    --text-dim: #8B98A9;
    --gold: #C9A24B;
    --green: #3FBF7F;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ---- ticker ---- */
  .ticker-wrap {
    width: 100%;
    overflow: hidden;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
    white-space: nowrap;
  }
  .ticker {
    display: inline-block;
    padding-left: 100%;
    animation: scroll-left 28s linear infinite;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    letter-spacing: 0.03em;
    color: var(--text-dim);
  }
  .ticker span { margin-right: 40px; }
  .up { color: var(--green); }
  .gold-txt { color: var(--gold); }
  @keyframes scroll-left {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ticker { animation: none; padding-left: 16px; }
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  /* ---- profile header ---- */
  .profile {
    text-align: center;
    margin-bottom: 40px;
  }
  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--gold), #8a6d2f);
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 30px;
    color: #0B1420;
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 4px var(--border);
  }
  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .tagline {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0;
    line-height: 1.5;
  }

  /* ---- section groups ---- */
  .section {
    margin-bottom: 30px;
  }
  .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 12px 4px;
  }

  .link-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .link-card:hover {
    background: var(--surface-hover);
    border-color: var(--gold);
    transform: translateY(-2px);
  }
  .link-card:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
  .link-main {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .link-icon {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: rgba(201,162,75,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .link-text { min-width: 0; }
  .link-title {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .link-sub {
    font-size: 12.5px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .link-arrow {
    color: var(--text-dim);
    font-size: 18px;
    flex-shrink: 0;
  }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 40px;
  }
</style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker"></div>
  </div>

  <div class="wrap">
    <div class="profile">
      <div class="avatar" id="avatarInitial">Y</div>
      <h1 class="name" id="displayName">Your Name</h1>
      <p class="tagline" id="tagline">Trading tools, referral codes &amp; everything else I recommend — all in one place.</p>
    </div>

    <div id="sections"></div>
  </div>

  <footer>Built with ♥ — click a link above</footer>

<script>
/* =========================================================
   EDIT EVERYTHING BELOW THIS LINE — no HTML/CSS knowledge needed.
   ========================================================= */

// Your name + short bio shown at the top
const PROFILE = {
  name: "tradingview",
  initial: "Y",           // letter shown in the avatar circle
  tagline: "Trading tools, referral codes & everything else I recommend — all in one place."
};

// Group your links into sections. Add/remove/reorder freely.
// icon can be any emoji. subtitle is optional (leave "" to hide it).
const SECTIONS = [
  {
    label: "Trading",
    links: [
      { icon: "📈", title: "Sign up on [Broker/App Name]", subtitle: "Use my referral code for a bonus", url: "https://tr.ee/aHwmjz" },
      { icon: "💹", title: "Another trading referral", subtitle: "Get a discount when you join", url: "https://tr.ee/aHwmjz" }
    ]
  },
  {
    label: "My Profiles",
    links: [
      { icon: "📸", title: "Instagram", subtitle: "@stxbandz", url: "https://www.instagram.com/stxbandz/" },
      { icon: "🎥", title: "YouTube", subtitle: "Subscribe for updates", url: "https://youtube.com/@yourhandle" },
      { icon: "🎵", title: "TikTok", subtitle: "@silksnypz", url: "https://www.tiktok.com/@silksnypz" }
    ]
  },
  {
    label: "Recommended",
    links: [
      { icon: "🛒", title: "Product I recommend", subtitle: "Referral / affiliate link", url: "https://example.com/?ref=YOURCODE3" }
    ]
  }
];

// Words that scroll in the ticker bar at the top (purely decorative)
const TICKER_ITEMS = [
  "WELCOME", "NEW REFERRAL BONUS AVAILABLE", "TAP ANY LINK BELOW", "THANKS FOR STOPPING BY"
];

/* =========================================================
   Nothing below this line needs to be touched.
   ========================================================= */

document.getElementById("displayName").textContent = PROFILE.name;
document.getElementById("avatarInitial").textContent = PROFILE.initial;
document.getElementById("tagline").textContent = PROFILE.tagline;

const sectionsEl = document.getElementById("sections");
SECTIONS.forEach(section => {
  const sec = document.createElement("div");
  sec.className = "section";

  const eyebrow = document.createElement("p");
  eyebrow.className = "eyebrow";
  eyebrow.textContent = section.label;
  sec.appendChild(eyebrow);

  section.links.forEach(link => {
    const a = document.createElement("a");
    a.className = "link-card";
    a.href = link.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    a.innerHTML = `
      <div class="link-main">
        <div class="link-icon">${link.icon || "🔗"}</div>
        <div class="link-text">
          <div class="link-title">${link.title}</div>
          ${link.subtitle ? `<div class="link-sub">${link.subtitle}</div>` : ""}
        </div>
      </div>
      <div class="link-arrow">→</div>
    `;
    sec.appendChild(a);
  });

  sectionsEl.appendChild(sec);
});

const tickerEl = document.getElementById("ticker");
const tickerText = TICKER_ITEMS.map(t => `<span>${t}</span>`).join("");
tickerEl.innerHTML = tickerText + tickerText; // duplicate for seamless loop
</script>

</body>
</html>
