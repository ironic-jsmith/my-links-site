<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stxbandz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E0F11;
    --surface: #16181B;
    --text: #E7E5DF;
    --text-dim: #86888E;
    --accent: #7C8A6E;
    --hairline: #26282C;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 72px 24px 96px;
  }

  /* ---- profile header ---- */
  .profile {
    text-align: center;
    margin-bottom: 56px;
  }
  .avatar {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    border: 1px solid var(--hairline);
    background: var(--bg);
    margin: 0 auto 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Schibsted Grotesk', sans-serif;
    font-weight: 600;
    font-size: 30px;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .name {
    font-family: 'Schibsted Grotesk', sans-serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.015em;
    margin: 0 0 10px;
  }
  .tagline {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 auto;
    max-width: 380px;
    line-height: 1.55;
  }

  /* ---- optional status / index line ---- */
  .status {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    margin: 0 0 56px;
    opacity: 0.7;
  }

  /* ---- section groups (film chapters) ---- */
  .section {
    margin-bottom: 44px;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin: 0 0 18px;
  }
  .chapter-num {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }
  .chapter-label {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text);
  }
  .chapter-rule {
    flex: 1;
    height: 1px;
    background: var(--hairline);
    position: relative;
    align-self: center;
  }
  .chapter-rule::after {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: var(--fill, 0%);
    background: var(--accent);
    transition: width 0.2s linear;
  }

  .link-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 14px 2px;
    text-decoration: none;
    color: var(--text);
    border: none;
    background: none;
  }
  .link-row + .link-row {
    border-top: 1px solid var(--hairline);
  }
  .link-main {
    display: flex;
    align-items: baseline;
    gap: 12px;
    min-width: 0;
  }
  .link-icon {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 16px;
    text-align: center;
  }
  .link-text { min-width: 0; }
  .link-title {
    position: relative;
    font-weight: 500;
    font-size: 15.5px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: inline-block;
  }
  .link-title::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -2px;
    height: 1px;
    width: 0;
    background: var(--accent);
    transition: width 0.25s ease;
  }
  .link-sub {
    font-size: 12.5px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .link-arrow {
    color: var(--text-dim);
    font-size: 15px;
    flex-shrink: 0;
    transition: transform 0.25s ease, color 0.25s ease;
  }
  .link-row:hover .link-title::after,
  .link-row:focus-visible .link-title::after {
    width: 100%;
  }
  .link-row:hover .link-arrow,
  .link-row:focus-visible .link-arrow {
    transform: translateX(3px);
    color: var(--accent);
  }
  .link-row:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 3px;
    border-radius: 2px;
  }

  footer {
    text-align: center;
    font-family: 'Geist Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.6;
    margin-top: 64px;
  }

  @media (prefers-reduced-motion: reduce) {
    .chapter-rule::after,
    .link-title::after,
    .link-arrow {
      transition: none;
    }
  }
</style>
</head>
<body>

  <div class="wrap">
    <div class="profile">
      <div class="avatar" id="avatarInitial">A</div>
      <h1 class="name" id="displayName">Anthony</h1>
      <p class="tagline" id="tagline"></p>
    </div>

    <p class="status" id="status" hidden></p>

    <div id="sections"></div>

    <footer id="footer"></footer>
  </div>

<script>
/* =========================================================
   EDIT EVERYTHING BELOW THIS LINE — no HTML/CSS knowledge needed.
   ========================================================= */

// Your name + short bio shown at the top
const PROFILE = {
  name: "stxbandz",
  initial: "S",                       // letter shown in the avatar ring
  tagline: "Builder, writer, investor — a quiet index of the things I make and recommend."
};

// Group your links into sections. Add/remove/reorder freely.
// icon is OPTIONAL — leave "" to hide it (emoji not required for the look).
// subtitle is optional (leave "" to hide it).
const SECTIONS = [
  {
    label: "Handles",
    links: [
      { icon: "", title: "TikTok", subtitle: "@silksnypz", url: "https://www.tiktok.com/@silksnypz" },
      { icon: "", title: "Instagram", subtitle: "@stxbandz", url: "https://www.instagram.com/stxbandz/" }
    ]
  },
  {
    label: "Trading/Fintech",
    links: [
      { icon: "", title: "Broker name", subtitle: "referral link", url: "#" },
      { icon: "", title: "Trading platform", subtitle: "referral link", url: "#" },
      { icon: "", title: "Fintech app", subtitle: "referral link", url: "#" }
    ]
  },
  {
    label: "Products",
    links: [
      { icon: "", title: "Product name", subtitle: "referral link", url: "#" },
      { icon: "", title: "Product name", subtitle: "referral link", url: "#" }
    ]
  }
];

// Optional low-contrast status / index line under the profile.
// Leave as [] to hide it entirely.
const TICKER_ITEMS = [
  "Selected works", "2026", "By appointment"
];

/* =========================================================
   Nothing below this line needs to be touched.
   ========================================================= */

document.getElementById("displayName").textContent = PROFILE.name;
document.getElementById("avatarInitial").textContent = PROFILE.initial;
document.getElementById("tagline").textContent = PROFILE.tagline;

const statusEl = document.getElementById("status");
if (TICKER_ITEMS && TICKER_ITEMS.length) {
  statusEl.textContent = TICKER_ITEMS.join("  ·  ");
  statusEl.hidden = false;
}

const sectionsEl = document.getElementById("sections");
SECTIONS.forEach((section, i) => {
  const sec = document.createElement("div");
  sec.className = "section";

  const head = document.createElement("div");
  head.className = "section-head";

  const num = document.createElement("span");
  num.className = "chapter-num";
  num.textContent = String(i + 1).padStart(2, "0");

  const label = document.createElement("span");
  label.className = "chapter-label";
  label.textContent = section.label;

  const rule = document.createElement("span");
  rule.className = "chapter-rule";

  head.append(num, label, rule);
  sec.appendChild(head);

  section.links.forEach(link => {
    const a = document.createElement("a");
    a.className = "link-row";
    a.href = link.url;
    if (!link.url.startsWith("mailto:")) {
      a.target = "_blank";
      a.rel = "noopener noreferrer";
    }

    const main = document.createElement("div");
    main.className = "link-main";

    if (link.icon) {
      const icon = document.createElement("span");
      icon.className = "link-icon";
      icon.textContent = link.icon;
      main.appendChild(icon);
    }

    const text = document.createElement("div");
    text.className = "link-text";
    const title = document.createElement("div");
    title.className = "link-title";
    title.textContent = link.title;
    text.appendChild(title);
    if (link.subtitle) {
      const sub = document.createElement("div");
      sub.className = "link-sub";
      sub.textContent = link.subtitle;
      text.appendChild(sub);
    }
    main.appendChild(text);

    const arrow = document.createElement("div");
    arrow.className = "link-arrow";
    arrow.textContent = "→";

    a.append(main, arrow);
    sec.appendChild(a);
  });

  sectionsEl.appendChild(sec);
});

document.getElementById("footer").textContent = "© 2026 — Selected Works";

/* chapter progress fill — calm scroll cue, no looping motion */
const rules = document.querySelectorAll(".chapter-rule");
function updateFill() {
  const vh = window.innerHeight;
  rules.forEach(rule => {
    const r = rule.getBoundingClientRect();
    const progress = Math.min(Math.max((vh - r.top) / vh, 0), 1);
    rule.style.setProperty("--fill", (progress * 100).toFixed(1) + "%");
  });
}
updateFill();
window.addEventListener("scroll", updateFill, { passive: true });
window.addEventListener("resize", updateFill);
</script>

</body>
</html>
