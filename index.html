    @keyframes drift1 { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(28px) scale(1.08); } }
    @keyframes drift2 { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-24px) scale(1.12); } }
    .reveal { opacity: 0; transform: translateY(18px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
    .reveal.is-visible { opacity: 1; transform: none; }
    .pricing-card { position: relative; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(92,214,125,0.2); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

    @media (prefers-reduced-motion: reduce) { .reveal { transition: none; opacity: 1; transform: none; } .hero-grid, .hero-beam { animation: none; } }
  </style>
</head>

  <script>
    (function () {
      var items = document.querySelectorAll(".reveal");
      if (!("IntersectionObserver" in window)) { items.forEach(function (el) { el.classList.add("is-visible"); }); return; }
      var io = new IntersectionObserver(function (entries) { entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add("is-visible"); io.unobserve(e.target); } }); }, { threshold: 0.15 });
      items.forEach(function (el) { io.observe(el); });
    })();
