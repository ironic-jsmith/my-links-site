<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Access — stxbandz</title>
<style>
  :root{
    --bg:#0E0F11;
    --surface:#16181B;
    --text:#E7E5DF;
    --text-dim:#86888E;
    --accent:#7C8A6E;
    --hairline:#26282C;
    --ease:cubic-bezier(0.16,1,0.3,1);
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;padding:0;
    background:radial-gradient(120% 80% at 50% -10%,rgba(124,138,110,0.06),transparent 60%),var(--bg);
    color:var(--text);
    font-family:Inter,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .login-wrap{
    width:100%;
    max-width:380px;
    padding:24px;
  }
  .login-card{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:32px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
  }
  .login-brand{
    font-family:Geist Mono,monospace;
    letter-spacing:0.22em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--accent);
    margin-bottom:6px;
  }
  .login-title{
    font-family:Schibsted Grotesk,sans-serif;
    font-weight:600;
    font-size:22px;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  .login-subtitle{
    font-size:13px;
    color:var(--text-dim);
    margin:0 0 24px;
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-family:Geist Mono,monospace;
    font-size:9px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:8px;
  }
  .field input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--hairline);
    background:rgba(2,8,4,0.5);
    color:var(--text);
    font-family:Geist Mono,monospace;
    font-size:12px;
    outline:none;
    transition:border-color 0.4s var(--ease),box-shadow 0.4s var(--ease);
  }
  .field input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(124,138,110,0.15);
  }
  .login-btn{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--accent);
    background:rgba(124,138,110,0.18);
    color:var(--text);
    font-family:Geist Mono,monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    cursor:pointer;
    transition:background 0.35s var(--ease),border-color 0.35s var(--ease),transform 0.2s var(--ease);
    margin-top:4px;
  }
  .login-btn:hover{
    background:rgba(124,138,110,0.34);
    border-color:#a2f7ef;
    transform:translateY(-1px);
  }
  .login-btn:active{
    transform:translateY(0);
  }
  .login-error{
    margin-top:12px;
    font-family:Geist Mono,monospace;
    font-size:11px;
    color:#B07A72;
    min-height:16px;
    transition:opacity 0.3s var(--ease);
  }
  .login-footer{
    margin-top:18px;
    text-align:center;
    font-size:11px;
    color:var(--text-dim);
  }
</style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">Terra Obscura</div>
      <h1 class="login-title">Dashboard Access</h1>
      <p class="login-subtitle">Enter the access key to continue.</p>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="pw">Access Key</label>
          <input type="password" id="pw" placeholder="••••••" spellcheck="false" />
        </div>
        <button type="submit" class="login-btn">Unlock Dashboard</button>
      </form>

      <div class="login-error" id="err" aria-live="polite"></div>

      <div class="login-footer">
        <a href="index.html">&larr; Back to index</a>
      </div>
    </div>
  </div>

<script>
  const AUTH_KEY = "stx_dash_auth";
  const PW = "test321";
  const form = document.getElementById("loginForm");
  const input = document.getElementById("pw");
  const err = document.getElementById("err");

  if (sessionStorage.getItem(AUTH_KEY) === "1") {
    window.location.replace("dashboard-view.html");
  }

  function showError(msg) {
    err.textContent = msg;
    err.style.opacity = "1";
    setTimeout(() => { err.style.opacity = "0"; }, 2200);
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    const v = input.value;
    if (v === PW) {
      err.textContent = "";
      sessionStorage.setItem(AUTH_KEY, "1");
      window.location.href = "dashboard-view.html";
    } else {
      showError("Incorrect access key.");
      input.value = "";
      input.focus();
    }
  });

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") form.requestSubmit();
  });
</script>
</body>
</html>
